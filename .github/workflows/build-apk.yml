name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        working-directory: AIAutoClicker
        run: |
          sed -i 's/
//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx3g" 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: AIAutoClicker/app/build/outputs/apk/debug/app-debug.apk
