name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check Gradle wrapper
        working-directory: AIAutoClicker
        run: |
          cat gradle/wrapper/gradle-wrapper.properties
          ls -la gradle/wrapper/

      - name: Build Debug APK
        working-directory: AIAutoClicker
        run: |
          chmod +x gradlew
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          export PATH=$PATH:/tmp/gradle/gradle-8.7/bin
          gradle assembleDebug --stacktrace 2>&1 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: AIAutoClicker/app/build/outputs/apk/debug/app-debug.apk
