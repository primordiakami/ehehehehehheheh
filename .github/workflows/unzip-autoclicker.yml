name: Unzip Autoclicker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip autoclicker.zip
        run: |
          sudo apt-get install -y unzip
          unzip autoclicker.zip
          rm autoclicker.zip

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'Unzip autoclicker.zip' || echo 'No changes to commit'
          git push
